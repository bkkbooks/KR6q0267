body:
  text: 江西道一禪師漢州什方縣人也姓馬氏本邑羅漢寺出家容貌奇異牛行虎視引舌過鼻足下有二輪文幼歲依資州唐和尚落髮受具於渝州圓律師唐開元中習定於衡嶽傳法院遇讓和尚知是法器問曰大德坐禪圖什麼師曰圖作佛讓乃取一磚於彼菴前磨師曰磨磚作麼讓曰磨作鏡師曰磨磚豈得成鏡讓曰磨磚既不成鏡坐禪豈得成佛耶師曰如何即是讓曰如牛駕車車不行打車即是打牛即是師無對讓又曰汝為學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理師聞示誨如飲醍醐禮拜問曰如何用心即合無相三昧讓曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問曰道非色相云何能見讓曰心地法眼能見乎道無相三昧亦復然矣師曰有成壞否讓曰若以成壞聚散而見道者非見道也聽吾偈曰心地含諸種遇澤悉皆萌三昧華無相何壞復何成師蒙開悟心意超然侍奉十秋日益玄奧初六祖謂讓和尚云西天般若多羅讖汝足下出一馬駒踏殺天下人蓋謂師也讓弟子六人惟師密受心印始自建陽佛跡嶺遷至臨川次至南康龔公山大曆中隸名於鍾陵開元寺時連帥路嗣恭聆風景慕親受宗旨由是四方學者雲集座下讓和尚聞師闡化江西問衆曰道一為衆說法否衆曰已為衆說法讓曰總未見人持箇消息來遂遣一僧往彼俟伊上堂時但問作麼生待渠有語記取來僧依教往問之師曰自從胡亂後三十年不少鹽醬僧回舉似讓讓然之師入室弟子一百三十九人各為一方宗主轉化無窮師於貞元四年正月中登建昌石門山於林中經行見洞壑平坦謂侍者曰吾之朽質當於來月歸茲地矣言訖而回既而示疾院主問和尚近日尊候如何師曰日面佛月面佛二月一日沐浴跏趺入滅元和中諡大寂禪師塔曰大莊嚴祖示衆云汝等諸人各信自心是佛此心即佛達磨大師從南天竺國來至中華傳上乘一心之法令汝等開悟又引楞伽經以印衆生心地恐汝顛倒不信此一心之法各各有之故楞伽經以佛語心為宗無門為法門夫求法者應無所求心外無別佛佛外無別心不取善不捨惡淨穢兩邊俱不依怙達罪性空念念不可得無自性故故三界唯心森羅及萬象一法之所印凡所見色皆是見心心不自心因色故有汝但隨時言說即事即理都無所礙菩提道果亦復如是於心所生即名為色知色空故生即不生若了此意乃可隨時著衣喫飯長養聖胎任運過時更有何事汝受吾教聽吾偈曰心地隨時說菩提亦只寧事理俱無礙當生即不生僧問如何是修道曰道不屬修若言修得修成還壞即同聲聞若言不修即同凡夫又問作何見解即得達道祖曰自性本來具足但於善惡事中不滯喚作修道人取善捨惡觀空入定即屬造作更若向外馳求轉疏轉遠但盡三界心量一念妄心即是三界生死根本但無一念即除生死根本即得法王無上珍寶無量劫來凡夫妄想諂曲邪僞我慢貢高合為一體故經云但以衆法合成此身起時唯法起滅時唯法滅此法起時不言我起滅時不言我滅前念後念中念念念不相待念念寂滅喚作海印三昧攝一切法如百千異流同歸大海都名海水住於一味即攝衆味住於大海即混諸流如人在大海中浴即用一切水所以聲聞悟迷凡夫迷悟聲聞不知聖心本無地位因果階級心量妄想修因證果住於空定八萬劫二萬劫雖即已悟悟已却迷諸菩薩觀如地獄苦沈空滯寂不見佛性若是上根衆生忽爾遇善知識指示言下領會更不歷於階級地位頓悟本性故經云凡夫有反覆心而聲聞無也對迷說悟本既無迷悟亦不立一切衆生從無量劫來不出法性三昧長在法性三昧中著衣喫飯言談祗對六根運用一切施為盡是法性不解返源隨名逐相迷情妄起造種種業若能一念返照全體聖心汝等諸人各達自心莫記吾語縱饒說得河沙道理其心亦不增縱說不得其心亦不減說得亦是汝心說不得亦是汝心乃至分身放光現十八變不如還我死灰來淋過死灰無力喻聲聞妄修因證果未淋過死灰有力喻菩薩道業純熟諸惡不染若說如來權教三藏河沙劫說不盡猶如鉤鎖亦不斷絶若悟聖心總無餘事久立珍重示衆云道不用修但莫汙染何為汙染但有生死心造作趨向皆是汙染若欲直會其道平常心是道何謂平常心無造作無是非無取捨無斷常無凡無聖經云非凡夫行非聖賢行是菩薩行只如今行住坐臥應機接物盡是道道即是法界乃至河沙妙用不出法界若不然者云何言心地法門云何言無盡燈一切法皆是心法一切名皆是心名萬法皆從心生心為萬法之根本經云識心達本源故號為沙門名等義等一切諸法皆等純一無雜若於教門中得隨時自在建立法界盡是法界若立真如盡是真如若立理一切法盡是理若立事一切法盡是事舉一千從理事無別盡是妙用更無別理皆由心之回轉譬如月影有若干真月無若干諸源水有若干水性無若干森羅萬象有若干虗空無若干說道理有若干無礙慧無若干種種成立皆由一心也建立亦得掃蕩亦得盡是妙用盡是自家非離真而有立處立處即真盡是自家體若不然者更是何人一切法皆是佛法諸法即是解脫解脫者即是真如諸法不出於真如行住坐臥悉是不思議用不待時節經云在在處處則為有佛佛是能仁有智慧善機性能破一切衆生疑網出離有無等縛凡聖情盡人法俱空轉無等倫超於數量所作無礙事理雙通如天起雲忽有還無不留礙跡猶如畫水成文不生不滅是大寂滅在纏名如來藏出纏名淨法身法身無窮體無增減能大能小能方能圓應物現形如水中月滔滔運用不立根栽不盡有為不住無為有為是無為家用無為是有為家依不住於依故云如空無所依心生滅義心真如義心真如者譬如明鏡照像鏡喻於心像喻諸法若心取法即涉外因緣即是生滅義不取諸法即是真如義聲聞聞見佛性菩薩眼見佛性了達無二名平等性性無有異用則不同在迷為識在悟為智順理為悟順事為迷迷即迷自家本心悟即悟自家本性一悟永悟不復更迷如日出時不合於暗智慧日出不與煩惱暗俱了心及境界妄想即不生妄想既不生即是無生法忍本有今有不假修道坐禪不修不坐即是如來清淨禪如今若見此理真正不造諸業隨分過生一衣一衲坐起相隨戒行增薰積於淨業但能如是何慮不通久立諸人珍重西堂百丈南泉侍祖玩月次祖曰正恁麼時如何西堂云正好供養百丈云正好修行南泉拂袖便去祖云經入藏禪歸海唯有普願獨超物外西堂藏百丈海南泉願南泉為衆僧行粥次祖問桶裡是甚麼泉曰這老漢合取口作恁麼語話祖便休百丈問如何是佛旨趣祖云正是汝放身命處大珠初參祖祖問曰從何處來曰越州大雲寺來祖曰來此擬須何事曰來求佛法祖曰自家寶藏不顧拋家散走作什麼我這裏一物也無求甚麼佛法珠遂禮拜問曰阿那箇是慧海自家寶藏祖曰即今問我者是汝寶藏一切具足更無缺少使用自在何假向外求覓珠於言下自識本心不由知覺踊躍禮謝師事六載後歸自撰頓悟入道要門論一卷祖見之告衆云越州有大珠圓明光透自在無遮障處也泐潭法會禪師問祖云如何是西來祖師意祖曰低聲近前來會便近前祖打一摑云六耳不同謀來日來會至來日猶入法堂云請和尚道祖云且去待老漢上堂時出來與汝證明會乃悟云謝大衆證明乃繞法堂一匝便去泐潭惟建禪師一日在法堂後坐禪祖見之乃吹建耳兩吹建起定見是祖却復入定祖歸方丈令侍者持一碗茶與建建不顧便自歸堂石鞏慧藏禪師本以弋獵為務惡見沙門因逐羣鹿從祖菴前過祖乃迎之藏問和尚見鹿過否祖曰汝是何人曰獵者祖曰汝解射否曰解射祖曰汝一箭射幾箇曰一箭射一箇祖曰汝不解射曰和尚解射否祖曰解射曰和尚一箭射幾箇曰一箭射一羣曰彼此是命何用射他一羣祖曰汝既知如是何不自射曰若教某甲自射即無下手處祖曰這漢曠劫無明煩惱今日頓息藏當時毀棄弓箭自以刀截髮投祖出家一日在厨作務次祖問曰作什麼曰牧牛祖曰作麼生牧曰一回入草去便把鼻孔拽來祖曰子真牧牛僧問祖云請和尚離四句絶百非直指某甲西來意祖云我今日無心情汝去問取智藏其僧乃問藏藏云汝何不問取和尚僧云和尚令某甲來問上座藏以手摩頭云今日頭痛汝去問海師兄其僧又去問海海云我這裏却不會僧乃舉似祖祖云藏頭白海頭黑麻谷寶徹禪師一日隨祖行次問如何是大涅槃祖云急徹云急箇什麼祖云看水大梅山法常禪師初參祖問如何是佛祖云即心是佛常即大悟後居大梅山祖聞師住山乃令一僧到問云和尚見馬師得箇什麼便住此山常云馬師向我道即心是佛我便向這裏住僧云馬師近日佛法又別常云作麼生別僧云近日又道非心非佛常云這老漢惑亂人未有了日任汝非心非佛我只管即心即佛其僧回舉似祖祖云梅子熟也汾州無業禪師參祖祖覩其狀貌瓌偉語音如鐘乃曰巍巍佛堂其中無佛業禮跪而問曰三乘文學粗窮其旨常聞禪門即心是佛實未能了祖曰只未了底心即是更無別物業又問如何是祖師西來密傳心印祖曰大德正閙在且去別時來業才出祖召曰大德業回首祖云是什麼業便領悟禮拜祖云這鈍漢禮拜作麼鄧隱峰辭祖祖曰甚處去云石頭去祖曰石頭路滑云竿木隨身逢場作戲便去才到石頭乃繞禪牀一匝振錫一下問是何宗旨頭曰蒼天蒼天峰無語却回舉似祖祖曰汝更去見他道蒼天蒼天汝便噓兩聲峰又去一依前問頭乃噓兩聲峰又無語歸舉似祖祖曰向汝道石頭路滑峰一日推土車次祖展腳在路上坐峰云請師收足祖云已展不收峰云已進不退乃推車碾過祖腳損歸法堂執斧子云適來碾損老僧腳底出來峰便出於祖前引頸祖乃置斧石臼和尚初參祖祖問什麼處來臼云烏臼來祖云烏臼近日有何言句臼云幾人於此茫然在祖云茫然且置悄然一句作麼生臼乃近前三步祖云我有七棒寄打烏臼你還甘否臼云和尚先喫某甲後甘却回烏臼亮座主參祖祖問曰見說座主大講得經論是否亮云不敢祖曰將甚麼講亮云將心講祖曰心如工伎兒意如和伎者爭解得經亮抗聲云心既講不得虗空莫講得麼祖曰却是虗空講得亮不肯便出將下階祖召云座主亮回首豁然大悟便禮拜祖曰這鈍根阿師禮拜作麼亮歸寺告聽衆曰某甲所講經論謂無人及得今日被馬大師一問平生工夫氷消瓦解徑入西山更無蹤跡洪州水老和尚初參祖問如何是西來的的意祖云禮拜著老才禮拜祖便與一踏老大悟起來撫掌呵呵大笑云也大奇也大奇百千三昧無量妙義只向一毛頭上便識得根源去便禮拜而退後告衆云自從一喫馬師踏直至如今笑不休龐居士問祖云不與萬法為侶者是甚麼人祖曰待汝一口吸盡西江水即向汝道又問祖云不昧本來人請師高著眼祖直下覷士云一種沒絃琴唯師彈得妙師直上覷士乃作禮祖歸方丈士隨後入曰適來弄巧成拙又問如水無䈥骨能勝萬斛舟此理如何祖曰這裏無水亦無舟說甚麼䈥骨僧問和尚為甚麼說即心即佛祖曰為止小兒啼曰啼止時如何祖曰非心非佛曰除此二種人來如何指示祖曰向伊道不是物曰忽遇其中人來時如何祖曰且教伊體會大道問如何是西來意祖曰即今是甚麼意僧問如何得合道祖曰我早不合道問如何是西來意祖便打曰我若不打汝諸方笑我也有小師耽源行腳回於祖前畫箇圓相就上拜了立祖曰汝莫欲作佛否曰某甲不解揑目祖曰吾不如汝小師不對有僧於祖前作四畫上一畫長下三畫短曰不得道一畫長三畫短離四句絶百非請和尚答某甲祖乃畫地一畫曰不得道長短答汝了也祖令僧馳書與徑山欽和尚書中畫一圓相徑山才開見索筆於中著一點後有僧舉似忠國師國師云欽師猶被馬師惑有講僧來問曰未審禪宗傳持何法祖却問曰座主傳持何法主曰忝講得經論二十餘本祖曰莫是獅子兒否主曰不敢祖作噓噓聲主曰此是法祖曰是甚麼法主曰獅子出窟法祖乃默然主曰此亦是法祖曰是甚麼法主曰獅子在窟法祖曰不出不入是甚麼法主無對遂辭出門祖召曰座主主回首祖曰是甚麼主亦無對祖曰這鈍根阿師洪州廉使問曰喫酒肉即是不喫即是祖曰若喫是中丞祿不喫是中丞福藥山惟儼禪師初參石頭便問三乘十二分教某甲粗知常聞南方直指人心見性成佛實未明了伏望和尚慈悲指示頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得子作麼生山罔措頭曰子因緣不在此且往馬大師處去山稟命恭禮祖仍伸前問祖曰我有時教伊揚眉瞬目有時不教伊揚眉瞬目有時揚眉瞬目者是有時揚眉瞬目者不是子作麼生山於言下契悟便禮拜祖曰你見甚麼道理便禮拜山曰某甲在石頭處如蚊子上鐵牛祖曰汝既如是善自護持侍奉三年一日祖問之曰子近日見處作麼生山曰皮膚脫落盡唯有一真實祖曰子之所得可謂協於心體布於四肢既然如是將三條篾來束取肚皮隨處住山去山曰某甲又是何人敢言住山祖曰不然未有常行而不住未有常住而不行欲益無所益欲為無所為宜作舟航無久住此山乃辭祖丹霞天然禪師再參祖未參禮便入僧堂內騎聖僧頸而坐時大衆驚愕遽報祖祖躬入堂視之曰我子天然霞即下地禮拜曰謝師賜法號因名天然潭州慧朗禪師初參祖祖問汝來何求曰求佛知見祖曰佛無知見知見乃魔耳汝自何來曰南嶽來曰汝從南嶽來未識曹溪心要汝速歸彼不宜他往祖問僧什麼處來云湖南來祖云東湖水滿也未云未祖云許多時雨水尚未滿道吾云滿也雲岩云湛湛地洞山云甚麼劫中曾缺少
